<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReMeasurement</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e293b">
</head>
<body class="bg-slate-50 text-slate-900 font-sans p-4 antialiased">
    <div class="max-w-md mx-auto">
        <header class="mb-6">
            <h1 class="text-2xl font-bold text-slate-800">ReMeasurement</h1>
        </header>

        <section class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm mb-6">
            <form id="add-form" class="space-y-3">
                <input type="text" id="well-id" placeholder="Номер скважины" required class="w-full border border-slate-300 p-3 rounded-lg text-base outline-none focus:ring-2 focus:ring-slate-500">
                <input type="number" step="any" id="val-1" placeholder="Показание 1" required class="w-full border border-slate-300 p-3 rounded-lg text-base outline-none">
                <input type="datetime-local" id="time-1" required class="w-full border border-slate-300 p-3 rounded-lg text-base outline-none">
                <button type="submit" class="w-full bg-slate-800 text-white p-3 rounded-lg text-base font-semibold hover:bg-slate-900 transition">Добавить</button>
            </form>
        </section>

        <div id="cards-container" class="space-y-4"></div>
    </div>
    <!-- ... (модальное окно без изменений) -->
    <script src="app.js"></script>
</body>
</html>
