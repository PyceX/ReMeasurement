<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReMeasurement</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e293b">
</head>
<body class="bg-slate-50 text-slate-900 font-sans p-3 antialiased">
    <div class="max-w-2xl mx-auto">
        <header class="mb-6">
            <h1 class="text-xl font-bold text-slate-800">ReMeasurement</h1>
        </header>

        <section class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm mb-6">
            <form id="add-form" class="grid grid-cols-2 gap-3">
                <input type="text" id="well-id" placeholder="Скважина №" required class="col-span-2 border border-slate-300 p-2 rounded-lg text-sm outline-none focus:ring-2 focus:ring-slate-500">
                <input type="number" step="any" id="val-1" placeholder="Показание 1" required class="border border-slate-300 p-2 rounded-lg text-sm outline-none">
                <input type="datetime-local" id="time-1" required class="border border-slate-300 p-2 rounded-lg text-sm outline-none">
                <button type="submit" class="col-span-2 bg-slate-800 text-white p-2 rounded-lg text-sm font-semibold hover:bg-slate-900 transition">Добавить</button>
            </form>
        </section>

        <div id="cards-container" class="grid grid-cols-1 gap-3"></div>
    </div>

    <!-- Модальное окно (остается прежним, но с правками классов) -->
    <div id="edit-modal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-xl p-5 w-full max-w-sm shadow-2xl">
            <h3 class="font-bold mb-4 text-sm uppercase text-slate-500">Редактирование</h3>
            <div id="edit-fields" class="space-y-3">
                <input type="hidden" id="edit-id">
                <input type="number" id="edit-v1" class="w-full border p-2 rounded text-sm">
                <input type="datetime-local" id="edit-t1" class="w-full border p-2 rounded text-sm">
                <div id="edit-second-group" class="space-y-3">
                    <input type="number" id="edit-v2" class="w-full border p-2 rounded text-sm">
                    <input type="datetime-local" id="edit-t2" class="w-full border p-2 rounded text-sm">
                </div>
            </div>
            <div class="flex gap-2 mt-6">
                <button onclick="closeEditModal()" class="flex-1 py-2 bg-slate-100 rounded-lg text-sm">Отмена</button>
                <button onclick="saveEdit()" class="flex-1 py-2 bg-slate-800 text-white rounded-lg text-sm">Сохранить</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
